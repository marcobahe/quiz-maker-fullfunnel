<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>QuizMeBaby — C4-v1 Big Q 5% | ICO-159</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1920px;
    height: 1080px;
    background: #ffffff;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* "?" gigante direita — 5% opacity */
  .big-q {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 860px;
    color: #6366f1;
    opacity: 0.05;
    line-height: 1;
    user-select: none;
    pointer-events: none;
    letter-spacing: -0.05em;
  }

  /* Layout editorial esquerda */
  .editorial {
    padding-left: 120px;
    max-width: 780px;
    z-index: 10;
    position: relative;
  }

  /* Kicker */
  .kicker {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    color: #6366f1;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  /* Headline empilhada — uma frase por linha */
  .headline {
    margin-bottom: 40px;
  }

  .headline-word {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 96px;
    color: #0f172a;
    line-height: 1.0;
    letter-spacing: -0.04em;
  }

  .headline-word:last-child {
    color: #0f172a;
  }

  /* Body text */
  .body-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: #64748b;
    line-height: 1.7;
    max-width: 440px;
  }

  /* Badge */
  .ico-badge {
    position: absolute;
    bottom: 32px;
    right: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #e2e8f0;
    letter-spacing: 0.06em;
    font-weight: 500;
    text-transform: uppercase;
    z-index: 20;
  }

  /* Versão label */
  .version-label {
    position: absolute;
    top: 40px;
    right: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #e2e8f0;
    letter-spacing: 0.08em;
    font-weight: 600;
    text-transform: uppercase;
    background: rgba(99, 102, 241, 0.08);
    border: 1px solid rgba(99, 102, 241, 0.15);
    padding: 6px 14px;
    border-radius: 100px;
    z-index: 20;
  }

  .version-label span { color: #6366f1; }
</style>
</head>
<body>
<div class="canvas">
  <!-- Elemento tipográfico gigante -->
  <div class="big-q">?</div>

  <div class="version-label">Variação C4-v1 · <span>5% opacity</span></div>

  <div class="editorial">
    <!-- Kicker -->
    <div class="kicker">QUIZ FULL-FUNNEL · QUIZMEBABY</div>

    <!-- Headline empilhada -->
    <div class="headline">
      <span class="headline-word">Cada</span>
      <span class="headline-word">pergunta</span>
      <span class="headline-word">é uma</span>
      <span class="headline-word">venda.</span>
    </div>

    <!-- Body -->
    <p class="body-text">
      Quiz interativo que captura, segmenta e converte.<br>
      Para marketeiros e criadores BR.
    </p>
  </div>

  <div class="ico-badge">QuizMeBaby · ICO-159 · C4-v1</div>
</div>
</body>
</html>
