<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>QuizMeBaby — C2 Editorial Assimétrico | ICO-159</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,400;0,600;0,700;0,800;1,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1920px;
    height: 1080px;
    background: #fafafa;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* Barra índigo esquerda — 3px, full height */
  .left-bar {
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: #6366f1;
    z-index: 20;
  }

  /* Layout editorial */
  .editorial {
    padding-left: 120px;
    max-width: 820px;
    z-index: 10;
  }

  /* Kicker */
  .kicker {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: #6366f1;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* Headline — duas linhas, segunda em itálico índigo */
  .headline {
    margin-bottom: 32px;
  }

  .headline-line1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #0f172a;
    line-height: 1.0;
    display: block;
    letter-spacing: -0.03em;
  }

  .headline-line2 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #6366f1;
    font-style: italic;
    line-height: 1.0;
    display: block;
    letter-spacing: -0.03em;
  }

  /* Body text */
  .body-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: #64748b;
    line-height: 1.65;
    margin-bottom: 48px;
    max-width: 520px;
  }

  /* CTA Button */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #0f172a;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.01em;
    padding: 16px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .cta-arrow {
    font-size: 16px;
    line-height: 1;
  }

  /* Espaço branco direito — proposital */
  .right-space {
    flex: 1;
    height: 100%;
    position: relative;
  }

  /* Elemento gráfico sutil direita — linhas horizontais finas */
  .right-lines {
    position: absolute;
    right: 160px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .right-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.15), transparent);
  }

  .rl-1 { width: 180px; }
  .rl-2 { width: 120px; }
  .rl-3 { width: 200px; }
  .rl-4 { width: 80px; }
  .rl-5 { width: 150px; }
  .rl-6 { width: 100px; }
  .rl-7 { width: 220px; }

  /* Corner badge */
  .ico-badge {
    position: absolute;
    bottom: 32px;
    right: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #cbd5e1;
    letter-spacing: 0.06em;
    font-weight: 500;
    text-transform: uppercase;
  }

  /* Subtle watermark grid right */
  .grid-watermark {
    position: absolute;
    right: 0;
    top: 0;
    width: 900px;
    height: 100%;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="left-bar"></div>
  <div class="grid-watermark"></div>

  <div class="editorial">
    <!-- Kicker -->
    <div class="kicker">QUIZ FULL-FUNNEL · SAAS BR</div>

    <!-- Headline -->
    <div class="headline">
      <span class="headline-line1">Seu quiz captura leads.</span>
      <span class="headline-line2">De verdade.</span>
    </div>

    <!-- Body -->
    <p class="body-text">
      Qualifique, segmente e converta sua audiência<br>
      com quizzes interativos. Sem código, sem complicação.
    </p>

    <!-- CTA -->
    <button class="cta-btn">
      Criar meu quiz
      <span class="cta-arrow">→</span>
    </button>
  </div>

  <div class="right-space">
    <div class="right-lines">
      <div class="right-line rl-1"></div>
      <div class="right-line rl-2"></div>
      <div class="right-line rl-3"></div>
      <div class="right-line rl-4"></div>
      <div class="right-line rl-5"></div>
      <div class="right-line rl-6"></div>
      <div class="right-line rl-7"></div>
    </div>
  </div>

  <div class="ico-badge">QuizMeBaby · ICO-159 · C2 Editorial Assimétrico</div>
</div>
</body>
</html>
